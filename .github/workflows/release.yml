name: Release Windows app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check source
        run: npm run check

      - name: Build portable Windows app
        run: npm run pack

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifact = Get-ChildItem -LiteralPath dist -Filter '*.exe' | Select-Object -First 1
          if (-not $artifact) { throw 'Windows executable was not generated.' }
          gh release create "${{ github.ref_name }}" $artifact.FullName --repo "${{ github.repository }}" --title "慢慢来 ${{ github.ref_name }}" --notes "首个公开版本：安静的 Windows 休息提醒与活动计时桌面工具。下载 EXE 后可直接运行；首次启动可能出现 Windows SmartScreen 提示。"
